# HTTP — redirect all traffic to HTTPS
server {
    listen 80;
    server_name skillflowapp.io www.skillflowapp.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name skillflowapp.io www.skillflowapp.io;

    ssl_certificate     /etc/letsencrypt/live/skillflowapp.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skillflowapp.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    location /static/ {
        alias /var/www/skillflow/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/skillflow/media/;
        expires 7d;
    }

    location / {
        proxy_pass         http://unix:/run/skillflow/gunicorn.sock;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
