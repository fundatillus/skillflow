# HTTP only — certbot --nginx will add the SSL server block and redirect automatically.
server {
    listen 80;
    server_name skillflowapp.io www.skillflowapp.io;

    client_max_body_size 20M;

    location /static/ {
        alias /var/www/skillflow/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/skillflow/media/;
        expires 7d;
    }

    location / {
        proxy_pass         http://unix:/run/skillflow/gunicorn.sock;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
